<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>胡氏家族世系圖</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Noto Serif TC","Songti SC","SimSun","MingLiU",serif;
  background:#3a2a1a;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:4px 0
}
.scroll-wrapper{width:100%;max-width:2000px;margin:0 auto;position:relative}
.scroll-container{
  overflow-x:auto;overflow-y:visible;background:#f5efe4;position:relative;
  border-left:3px solid #8b7355;border-right:3px solid #8b7355;
  box-shadow:0 8px 40px rgba(0,0,0,0.3)
}
/* Scroll borders */
.scroll-top,.scroll-bottom{
  height:28px;position:relative;
  background:linear-gradient(90deg,#4a3a4a 0%,#5a4a5a 8%,#6a5a6a 15%,#7a6a7a 22%,#5a4a5a 30%,#4a3a4a 38%,#6a5a6a 46%,#7a6a7a 54%,#5a4a5a 62%,#4a3a4a 70%,#6a5a6a 78%,#7a6a7a 85%,#5a4a5a 92%,#4a3a4a 100%);
  overflow:hidden
}
.scroll-top::after,.scroll-bottom::after{
  content:'';position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#c89b3c,#e8b84c,#d4a83a,#c89b3c)
}
.scroll-top::after{bottom:0}
.scroll-bottom::before{
  content:'';position:absolute;left:0;right:0;top:0;height:3px;
  background:linear-gradient(90deg,#c89b3c,#e8b84c,#d4a83a,#c89b3c)
}
.scroll-top::before{
  content:'';position:absolute;left:0;right:0;height:20px;
  background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,0.03) 4px,rgba(255,255,255,0.03) 8px)
}
/* Watermark */
.scroll-container::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 300px 120px at 20% 15%,rgba(180,160,130,0.08) 0%,transparent 70%),
    radial-gradient(ellipse 250px 100px at 50% 35%,rgba(170,150,120,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 280px 110px at 75% 55%,rgba(160,140,110,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 200px 80px at 30% 75%,rgba(175,155,125,0.05) 0%,transparent 70%),
    radial-gradient(ellipse 350px 150px at 60% 85%,rgba(165,145,115,0.06) 0%,transparent 70%)
}
/* Header */
.header{
  background:linear-gradient(180deg,#2a1a0a,#3a2a1a);padding:24px 30px 18px;
  text-align:center;border-bottom:2px solid #c89b3c;position:relative
}
.header::after{content:'';position:absolute;bottom:-4px;left:10%;right:10%;height:1px;background:#8b7355}
.header h1{color:#e8d5a8;font-size:26px;font-weight:700;letter-spacing:8px;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.header .subtitle{color:#c8b080;font-size:13px;letter-spacing:4px;margin-top:4px}
/* Search */
.search-area{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 20px 10px;background:rgba(245,239,228,0.95);
  border-bottom:1px solid #c8b898;position:sticky;top:0;z-index:100;backdrop-filter:blur(4px)
}
.search-area label{color:#5a4a3a;font-size:14px;font-weight:600;letter-spacing:1px}
#searchBox{
  padding:7px 14px;border:1px solid #b8a888;border-radius:4px;font-size:15px;
  width:320px;background:#faf6ed;color:#3a2a1a;font-family:inherit;outline:none;transition:border-color 0.2s
}
#searchBox:focus{border-color:#c89b3c;box-shadow:0 0 0 2px rgba(200,155,60,0.15)}
#searchBox::placeholder{color:#a09080}
.search-count{font-size:12px;color:#8a7a6a;min-width:60px}
/* ===== TREE ===== */
.tree{
  padding:20px 20px 30px;position:relative;z-index:1;
  display:flex;gap:2px;align-items:flex-start;min-height:400px
}
/* ===== BRANCH ===== */
.branch{
  flex:0 0 auto;position:relative;padding:12px 10px 20px;
  border-left:4px solid;border-radius:4px;margin:0 3px;
  min-width:100px;max-width:440px
}
.branch-header{
  text-align:center;font-size:12px;font-weight:700;letter-spacing:2px;
  color:#5a4a3a;padding:2px 8px 10px;border-bottom:1px solid #c8b898;margin-bottom:6px
}
/* ===== PERSON CARD ===== */
.person-card{
  display:flex;flex-direction:column;align-items:center;padding:4px 3px;
  border-radius:4px;position:relative;cursor:pointer;transition:all 0.2s;min-width:28px
}
.person-card:hover{background:rgba(200,155,60,0.15)}
.person-card .name{
  writing-mode:vertical-rl;text-orientation:upright;
  font-size:14px;line-height:1.1;letter-spacing:1px;color:#2a1a0a;white-space:nowrap
}
.person-card .rel-badge{
  display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;
  margin-top:2px;font-weight:700;line-height:1.3;letter-spacing:0
}
.rel-son{background:#c0392b;color:#fff}
.rel-daughter{background:#e67e22;color:#fff}
.rel-wife{background:#8e44ad;color:#fff}
.rel-husband{background:#2980b9;color:#fff}
.rel-ancestor{background:#7f8c8d;color:#fff}
.rel-spouse{background:#16a085;color:#fff}
.rel-unknown{background:#95a5a6;color:#fff}
/* Couple */
.couple{
  display:flex;flex-direction:row;align-items:center;gap:1px;
  position:relative;padding:0 2px
}
.couple .marriage-dot{
  width:3px;height:3px;border-radius:50%;background:#a08060;flex-shrink:0;margin:0 1px
}
/* ===== TREE NODE ===== */
.tree-node{
  display:flex;flex-direction:column;align-items:center;position:relative
}
/* Parent content (person card + vertical line down) */
.parent-unit{
  display:flex;flex-direction:column;align-items:center;position:relative
}
/* Vertical line from parent down */
.v-line{
  width:3px;height:18px;background:#8b4513;flex-shrink:0;border-radius:1px
}
/* Children section */
.children-section{
  display:flex;gap:4px;position:relative;padding-top:0;justify-content:center;flex-wrap:wrap
}
/* Horizontal bar over children */
.h-bar{
  position:absolute;top:0;left:15%;right:15%;height:3px;
  background:#8b4513;border-radius:1px;z-index:1
}
.h-bar.single{display:none}
/* Vertical line up from child to horizontal bar */
.children-section>.tree-node::before{
  content:'';position:absolute;top:-18px;left:50%;
  width:3px;height:18px;background:#8b4513;z-index:2;border-radius:1px
}
/* No children - no v-line needed */
.tree-node.leaf .v-line{display:none}
/* Highlight states */
.person-card.active{
  background:rgba(200,155,60,0.25)!important;
  box-shadow:0 0 0 2px #c89b3c!important
}
.person-card.highlight-match{
  background:rgba(231,76,60,0.2)!important;
  box-shadow:0 0 0 2px #e74c3c!important;animation:pulse 0.6s ease-in-out 3
}
@keyframes pulse{50%{box-shadow:0 0 0 4px rgba(231,76,60,0.4)}}
.person-card.dimmed{opacity:0.35}
/* Tooltip */
.person-card .tooltip{
  display:none;position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#3a2a1a;color:#e8d5a8;
  padding:3px 8px;border-radius:3px;font-size:11px;white-space:nowrap;
  z-index:50;pointer-events:none;border:1px solid #c89b3c
}
.person-card:hover .tooltip{display:block}
.person-card .tooltip::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:#3a2a1a
}
/* Legend */
.legend{
  display:flex;gap:18px;align-items:center;padding:10px 30px;
  background:#efe8da;border-top:1px solid #d8c8b8;font-size:12px;flex-wrap:wrap
}
.legend-item{display:flex;align-items:center;gap:5px;color:#5a4a3a}
.legend-box{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:700;color:#fff}
/* Responsive */
@media(max-width:768px){
  .scroll-container{border-left:none;border-right:none}
  .header h1{font-size:20px;letter-spacing:4px}
  .header{padding:16px 14px 12px}
  .search-area{flex-wrap:wrap;padding:10px 12px}
  #searchBox{width:100%}
  .tree{padding:12px 8px;flex-wrap:wrap;gap:8px;min-height:auto}
  .branch{max-width:100%;margin:0;min-width:130px}
  .branch-header{font-size:11px}
  .person-card .name{font-size:12px}
  .scroll-top,.scroll-bottom{height:18px}
}
/* Scrollbar */
.scroll-container::-webkit-scrollbar{height:8px}
.scroll-container::-webkit-scrollbar-track{background:#e8dcc8}
.scroll-container::-webkit-scrollbar-thumb{background:#8b7355;border-radius:4px}
.scroll-container::-webkit-scrollbar-thumb:hover{background:#6a5a4a}
</style>
</head>
<body>
<div class="scroll-wrapper">
  <div class="scroll-top"></div>
  <div class="scroll-container">
    <div class="header">
      <h1>胡氏家族世系圖</h1>
      <div class="subtitle">Hu Family Genealogy · 家譜卷軸</div>
    </div>
    <div class="search-area">
      <label for="searchBox">🔍 搜尋</label>
      <input type="text" id="searchBox" placeholder="輸入姓名搜尋…" autocomplete="off">
      <span class="search-count" id="searchCount"></span>
      <span style="font-size:11px;color:#a09080">· 點選姓名高亮世系</span>
    </div>
    <div class="tree" id="tree"></div>
    <div class="legend">
      <span class="legend-item"><span class="legend-box" style="background:#c0392b">兒</span> 兒子</span>
      <span class="legend-item"><span class="legend-box" style="background:#e67e22">女</span> 女兒</span>
      <span class="legend-item"><span class="legend-box" style="background:#8e44ad">媳</span> 媳婦</span>
      <span class="legend-item"><span class="legend-box" style="background:#2980b9">婿</span> 女婿</span>
      <span class="legend-item"><span class="legend-box" style="background:#16a085">妻</span> 妻子</span>
      <span class="legend-item"><span class="legend-box" style="background:#95a5a6">?</span> 不詳</span>
      <span class="legend-item" style="margin-left:auto;font-size:11px;color:#8a7a6a;">
        棕色粗線 = 親子關係
      </span>
    </div>
  </div>
  <div class="scroll-bottom"></div>
</div>

<script>
// ===== TREE DATA =====
const BRANCH_COLORS = {
  shouhe:  { hex:'#3498db', bg:'rgba(52,152,219,0.04)' },
  wangzhong:{hex:'#27ae60', bg:'rgba(39,174,96,0.04)' },
  qinghe:  { hex:'#f39c12', bg:'rgba(243,156,18,0.04)' },
  weixian: { hex:'#9b59b6', bg:'rgba(155,89,182,0.04)' },
  weida:   { hex:'#e74c3c', bg:'rgba(231,76,60,0.04)' },
  weifu:   { hex:'#e67e22', bg:'rgba(230,126,34,0.04)' },
  weihao:  { hex:'#e84393', bg:'rgba(232,67,147,0.04)' },
  weiyou:  { hex:'#95a5a6', bg:'rgba(149,165,166,0.04)' },
  weiyuan: { hex:'#1abc9c', bg:'rgba(26,188,156,0.04)' }
};

function P(name,rel){return{name,rel}}
function family(persons,children){
  return{persons:Array.isArray(persons)?persons:[persons], children:children||[]}
}

const treeData = [
  // === 维显公 (purple) ===
  {
    id:'weixian',label:'维显公',...BRANCH_COLORS.weixian,
    root:family([P('胡维显','祖'),P('黄金凤','妻'),P('周秀菊','妻')],[
      // 1. 胡运美 + 司徒元洪
      family([P('胡运美','女'),P('司徒元洪','婿')],[
        family([P('司徒振兴','兒'),P('谢运月霞','媳')]),
        family([P('司徒少霞','女'),P('陈东兴','婿')]),
        family([P('司徒永全','兒'),P('陈金英','媳')],[
          family([P('陈国华','兒'),P('胡诗韵','媳')],[
            family([P('陈俊延','兒')]),
            family([P('陈子豪','兒')]),
            family([P('陈雯芊','女')])
          ])
        ])
      ]),
      // 2. 胡龙亿 + 冯桂霞
      family([P('胡龙亿','兒'),P('冯桂霞','媳')],[
        family([P('刘敬宽','兒'),P('刘佩玲','媳')],[
          family([P('林依蓓','媳'),P('胡帼洋','兒')]),
          family([P('胡帼震','女')]),
          family([P('胡滕林','兒')]),
          family([P('胡照岚','女')]),
          family([P('胡乔淇','女')])
        ])
      ]),
      // 3. 黄家强 + 胡美花
      family([P('黄家强','婿'),P('胡美花','女')],[
        family([P('黄维星','兒'),P('林金梅','媳')]),
        family([P('黎广文','兒')]),
        family([P('黄锦源','女')]),
        family([P('黄爱贞','女')]),
        family([P('黄爱奇','兒')])
      ]),
      // 4. 李锐欢 + 胡美多
      family([P('李锐欢','婿'),P('胡美多','女')],[
        family([P('俞小玲','媳')]),
        family([P('李清坤','兒')]),
        family([P('李清标','兒')]),
        family([P('黄芝心','媳')])
      ]),
      // 5. 胡龙科 + 吴凤德
      family([P('胡龙科','兒'),P('吴凤德','媳')],[
        family([P('郭特维','婿')]),
        family([P('李惠真','女')]),
        family([P('胡渐彦','兒'),P('蔡群力','媳')],[
          family([P('胡翠珊','女')]),
          family([P('胡翠雯','女')])
        ]),
        family([P('胡渐雄','兒'),P('钟玉芬','媳')]),
        family([P('周碧文','女')]),
        family([P('胡碧君','女')]),
        family([P('胡碧勋','兒')]),
        family([P('胡培郁','兒')])
      ]),
      // 6. 杨观新 + 胡美素
      family([P('杨观新','婿'),P('胡美素','女')],[
        family([P('杨晋飞','兒')]),
        family([P('杨雪虹','女')]),
        family([P('杨雪莉','女')]),
        family([P('胡碧清','女')])
      ]),
      // 7. 林国汉 + 胡美缘
      family([P('林国汉','婿'),P('胡美缘','女')],[
        family([P('林爱婷','女')]),
        family([P('林爱祥','兒')]),
        family([P('胡碧勋','兒')]),
        family([P('郭晓旭','媳')]),
        family([P('胡培旭','兒')]),
        family([P('谢源涛','婿')])
      ])
    ])
  },
  // === 维达公 (red) ===
  {
    id:'weida',label:'维达公',...BRANCH_COLORS.weida,
    root:family([P('胡维达','祖'),P('周美容','妻')],[
      // 1. 杨观新 + 胡美素
      family([P('杨观新','婿'),P('胡美素','女')],[
        family([P('杨雪虹','女')]),
        family([P('杨雪莉','女')]),
        family([P('李义祥','婿')]),
        family([P('林爱婷','女')])
      ]),
      // 2. 林国汉 + 胡美缘
      family([P('林国汉','婿'),P('胡美缘','女')],[
        family([P('林培育','兒')]),
        family([P('林培志','兒')]),
        family([P('郭晓旭','兒')]),
        family([P('谢莉薇','媳')])
      ]),
      // 3. 胡龙森 + 黄月玉
      family([P('胡龙森','兒'),P('黄月玉','媳')],[
        family([P('叶绍强','婿'),P('胡碧琳','女')],[
          family([P('叶瑾熙','兒')]),
          family([P('叶瑾毅','兒')])
        ]),
        family([P('胡渐植','兒'),P('黎淑菁','媳')],[
          family([P('胡嘉玮','兒')]),
          family([P('胡嘉瑜','女')])
        ]),
        family([P('胡渐彪','兒')],[
          family([P('胡轩厚','兒')])
        ])
      ]),
      // 4. 吕宝强 + 胡珍 [CRITICAL: 胡渐熺]
      family([P('吕宝强','兒'),P('胡珍','媳')],[
        family([P('陈德锋','兒'),P('胡渐熺','媳')],[
          family([P('胡嘉盈','女')]),
          family([P('胡嘉馨','女')]),
          family([P('胡嘉厚','兒')])
        ]),
        family([P('江志彬','婿'),P('胡欣','女')],[
          family([P('江钰琦','女')]),
          family([P('江钰莹','女')])
        ])
      ]),
      // 5. 胡龙迪 + 游秀霞
      family([P('胡龙迪','兒'),P('游秀霞','媳')],[
        family([P('胡润欣','女')]),
        family([P('胡渐镇','兒'),P('胡燕铃','女')])
      ]),
      // 6. 陈亚旺 + 胡美丽
      family([P('陈亚旺','婿'),P('胡美丽','女')],[
        family([P('陈淑蓉','女')]),
        family([P('陈荣耀','兒')]),
        family([P('陈淑铃','女')])
      ]),
      // 7. 龚羽华 + 胡美秀
      family([P('龚羽华','婿'),P('胡美秀','女')],[
        family([P('龚百瀚','兒')]),
        family([P('龚百阳','兒')]),
        family([P('龚百炜','兒')])
      ]),
      // 8. 胡龙勇 + 陈翠媚
      family([P('胡龙勇','兒'),P('陈翠媚','媳')],[
        family([P('胡渐逸','兒'),P('胡慧慧','媳')],[
          family([P('胡嘉绚','女')])
        ]),
        family([P('丁纳福','婿'),P('胡蕾莎','女')])
      ]),
      // 9. 关银欢 + 胡欢
      family([P('关银欢','婿'),P('胡欢','女')],[
        family([P('关卓贤','兒')]),
        family([P('关绮娜','女')]),
        family([P('关婉梨','女')]),
        family([P('关卓儒','兒')])
      ]),
      // 10. 胡国欢 + 周美月
      family([P('胡国欢','兒'),P('周美月','媳')],[
        family([P('胡雨涵','女')]),
        family([P('胡兆东','兒'),P('胡翠媚','媳')],[
          family([P('胡艳芳','女')]),
          family([P('胡耀新','兒')])
        ]),
        family([P('余仲山','婿'),P('胡瑶','女')],[
          family([P('余凯茵','女')]),
          family([P('余海业','兒')])
        ]),
        family([P('胡利权','兒')])
      ]),
      // 11. 胡瑞球 + 周素心
      family([P('胡瑞球','兒'),P('周素心','媳')],[
        family([P('胡文杰','兒'),P('凌丽丽','媳')],[
          family([P('胡景桐','兒')]),
          family([P('胡慧仪','女')])
        ]),
        family([P('胡媚杰','女')])
      ]),
      // 12. 李应玉 + 胡兰
      family([P('李应玉','婿'),P('胡兰','女')],[
        family([P('李慧贞','女')]),
        family([P('李慧颜','女')]),
        family([P('李安泰','兒')])
      ])
    ])
  },
  // === 维富公 (orange) ===
  {
    id:'weifu',label:'维富公',...BRANCH_COLORS.weifu,
    root:family([P('胡维富','祖'),P('关月眉','妻')],[
      // 1. 胡现龙 + 李亚明
      family([P('胡现龙','兒'),P('李亚明','媳')],[
        family([P('陈潮生','婿'),P('胡月莲','女')],[
          family([P('陈素仪','女')])
        ]),
        family([P('洪及元','婿'),P('胡元英','女')],[
          family([P('洪楚彬','兒')]),
          family([P('洪有瑞','女')])
        ])
      ]),
      // 2. 胡业龙
      family([P('胡业龙','兒')]),
      // 3. 胡均龙 + 关如娣
      family([P('胡均龙','兒'),P('关如娣','媳')],[
        family([P('胡志雄','兒'),P('陈祖梅','媳')],[
          family([P('胡宏骏','兒')]),
          family([P('胡诗敏','女')]),
          family([P('胡诗雅','女')])
        ])
      ]),
      // 4. 胡锐龙
      family([P('胡锐龙','兒')],[
        family([P('胡景群','女')])
      ]),
      // 5. 胡运女
      family([P('胡运女','女')]),
      // 6. 麦志光 + 胡超仪

// ===== RENDER =====
function renderPersonCard(p){
  var relClass = p.rel==='?'||p.rel==='不详'?'rel-unknown'
    : p.rel==='祖'||p.rel==='眷'?'rel-ancestor'
    : p.rel==='兒'||p.rel==='儿'?'rel-son'
    : p.rel==='女'?'rel-daughter'
    : p.rel==='媳'?'rel-wife'
    : p.rel==='婿'?'rel-husband'
    : p.rel==='妻'?'rel-spouse'
    : 'rel-unknown';
  var relLabel = p.rel;
  var tip = p.rel==='祖'?'始祖 '+p.name
    : p.rel==='妻'?'配偶 '+p.name
    : p.rel==='兒'||p.rel==='儿'?'兒子 '+p.name
    : p.rel==='女'?'女兒 '+p.name
    : p.rel==='媳'?'媳婦(嫁入) '+p.name
    : p.rel==='婿'?'女婿(娶胡家女) '+p.name
    : p.rel==='?'||p.rel==='不详'?'不詳 '+p.name
    : p.rel==='眷'?'家眷 '+p.name
    : p.name;
  return '<div class="person-card" data-name="'+p.name+'" data-rel="'+p.rel+'">'
    + '<span class="name">'+p.name+'</span>'
    + '<span class="rel-badge '+relClass+'">'+relLabel+'</span>'
    + '<span class="tooltip">'+tip+'</span></div>';
}

function renderCouple(persons){
  if(persons.length===1) return renderPersonCard(persons[0]);
  var h='<div class="couple">';
  for(var i=0;i<persons.length;i++){
    h+=renderPersonCard(persons[i]);
    if(i<persons.length-1) h+='<span class="marriage-dot"></span>';
  }
  return h+'</div>';
}

function renderNode(node){
  if(!node) return '';
  var hasKids = node.children && node.children.length>0;
  var singleChild = hasKids && node.children.length===1;
  var cls = 'tree-node'+(hasKids?'':' leaf');

  var h='<div class="'+cls+'">';
  // Parent unit
  h+='<div class="parent-unit">';
  h+=renderCouple(node.persons);
  if(hasKids) h+='<div class="v-line"></div>';
  h+='</div>';

  if(hasKids){
    h+='<div class="children-section">';
    h+='<div class="h-bar'+(singleChild?' single':'')+'"></div>';
    for(var i=0;i<node.children.length;i++){
      h+=renderNode(node.children[i]);
    }
    h+='</div>';
  }
  return h+'</div>';
}

function renderBranch(branch){
  return '<div class="branch" data-branch="'+branch.id
    +'" style="border-left-color:'+branch.hex+';background:'+branch.bg+'">'
    + '<div class="branch-header" style="color:'+branch.hex+'">'+branch.label+'</div>'
    + renderNode(branch.root)
    + '</div>';
}

// ===== INIT =====
(function(){
  var treeEl=document.getElementById('tree');
  treeData.forEach(function(b){treeEl.innerHTML+=renderBranch(b);});

  // Click to highlight lineage within same branch
  document.querySelectorAll('.person-card').forEach(function(card){
    card.addEventListener('click',function(e){
      e.stopPropagation();
      var all=document.querySelectorAll('.person-card');
      if(this.classList.contains('active')){
        all.forEach(function(c){c.classList.remove('active','dimmed');});
        return;
      }
      all.forEach(function(c){c.classList.remove('active','dimmed');});
      var branch=this.closest('.branch');
      if(branch){
        branch.querySelectorAll('.person-card').forEach(function(c){c.classList.add('active');});
        document.querySelectorAll('.branch').forEach(function(b){
          if(b!==branch){
            b.querySelectorAll('.person-card').forEach(function(c){c.classList.add('dimmed');});
          }
        });
      }
    });
  });

  // Click outside to clear
  document.addEventListener('dblclick',function(){
    document.querySelectorAll('.person-card').forEach(function(c){c.classList.remove('active','dimmed');});
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest('.person-card')){
      document.querySelectorAll('.person-card').forEach(function(c){c.classList.remove('active','dimmed');});
    }
  });

  // Search
  var searchBox=document.getElementById('searchBox');
  var searchCount=document.getElementById('searchCount');
  var allCards=document.querySelectorAll('.person-card');

  function doSearch(q){
    var t=q.trim();
    allCards.forEach(function(c){c.classList.remove('highlight-match','dimmed');});
    if(!t){searchCount.textContent='';return;}
    var m=0,first=null;
    allCards.forEach(function(c){
      var n=c.getAttribute('data-name')||'';
      if(n.indexOf(t)!==-1){
        c.classList.add('highlight-match');m++;
        if(!first) first=c;
      }else{
        c.classList.add('dimmed');
      }
    });
    searchCount.textContent=m>0?'找到 '+m+' 人':'無結果';
    if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
  }

  searchBox.addEventListener('input',function(){doSearch(this.value);});
  searchBox.addEventListener('keydown',function(e){
    if(e.key==='Escape'){this.value='';doSearch('');this.blur();}
  });
})();
</script>
